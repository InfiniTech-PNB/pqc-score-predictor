# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: PQC score predictor CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  # --- STAGE 1: TEST ---
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.12
      uses: actions/setup-python@v4
      with:
        python-version: "3.12"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    - name: Lint with flake8
      run: |
        pip install flake8
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
    # Optional: pytest (commented out if you haven't written tests yet)
    # - name: Test with pytest
    #   run: pytest

  # --- STAGE 2: DEPLOY ---
  deploy:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: self-hosted  # This targets your EC2 runner

    steps:
    - name: Stop service for clean deployment
      run: sudo pm2 stop pqc-api || true
    - name: Force Cleanup with Sudo
      run: sudo rm -rf /home/ubuntu/pqc-runner/_work/pqc-score-predictor/pqc-score-predictor/*
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        clean: false

    - name: Setup Virtual Environment & Tools
      run: |
        # 1. Create venv if it doesn't exist
        python3 -m venv venv2
        
        # 2. Install Python deps
        ./venv2/bin/pip install --upgrade pip
        ./venv2/bin/pip install -r requirements.txt

    - name: Restart Service with PM2
      run: |
        # Restart the api if it exists, otherwise start it
        sudo pm2 restart pqc-api || sudo pm2 start "./venv2/bin/uvicorn main:app --host 0.0.0.0 --port 9000" --name "pqc-api"
        sudo pm2 save
